name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build executable
        run: .\build_windows.bat
      - name: Package artifact
        run: Compress-Archive -Path dist\DiskBloom\* -DestinationPath DiskBloom-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: DiskBloom-Windows
          path: DiskBloom-Windows.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon-x11-0 libxcb-cursor0
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build executable
        run: |
          chmod +x build_linux.sh
          ./build_linux.sh
      - name: Package artifact
        run: tar -czf DiskBloom-Linux.tar.gz -C dist DiskBloom
      - uses: actions/upload-artifact@v4
        with:
          name: DiskBloom-Linux
          path: DiskBloom-Linux.tar.gz

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build app
        run: |
          chmod +x build_linux.sh
          ./build_linux.sh
      - name: Package artifact
        run: tar -czf DiskBloom-macOS.tar.gz -C dist DiskBloom
      - uses: actions/upload-artifact@v4
        with:
          name: DiskBloom-macOS
          path: DiskBloom-macOS.tar.gz
